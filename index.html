<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Your Name</title>

  <!-- Font -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', sans-serif;
    }

    body {
      height: 100vh;
      background: radial-gradient(circle at top, #1a1a1a, #0a0a0a);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .container {
      width: 90%;
      max-width: 420px;
      text-align: center;
    }

    .card {
      backdrop-filter: blur(20px);
      background: rgba(255, 255, 255, 0.05);
      border-radius: 20px;
      padding: 30px 20px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.5);
      border: 1px solid rgba(255,255,255,0.08);
    }

    .profile img {
      width: 90px;
      border-radius: 50%;
      margin-bottom: 15px;
      border: 2px solid rgba(255,255,255,0.1);
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 600;
    }

    .tagline {
      font-size: 0.9rem;
      color: #aaa;
      margin-top: 5px;
      margin-bottom: 25px;
    }

    .links a {
      display: block;
      text-decoration: none;
      color: white;
      padding: 14px;
      margin: 10px 0;
      border-radius: 12px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.08);
      transition: all 0.25s ease;
      position: relative;
      overflow: hidden;
    }

    .links a::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(120deg, transparent, rgba(255,255,255,0.15), transparent);
      opacity: 0;
      transition: 0.3s;
    }

    .links a:hover::before {
      opacity: 1;
    }

    .links a:hover {
      transform: translateY(-2px) scale(1.02);
      background: rgba(255,255,255,0.1);
    }

    .links span {
      position: relative;
      z-index: 1;
      font-weight: 500;
    }

    .footer {
      margin-top: 20px;
      font-size: 0.7rem;
      color: #666;
    }

    @media (max-width: 500px) {
      .card {
        padding: 25px 15px;
      }
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="card">

      <div class="profile">
        <img src="your-image.jpg" alt="Profile"/>
        <h1>Ethan LeFevre</h1>
        <p class="tagline">Programmer</p>
      </div>

      <div class="links">
        <a href="www.linkedin.com/in/ethan-lefevre-711754383"><span>My LinkedIn</span></a>
        <a href="https://github.com/ethan-lefevre"><span>My GitHub</span></a>
        <a href="https://pinpointmichigan.com"><span>PinPoint Michigan: Wrestling Rankings App</span></a>
      </div>

      <div class="footer">
        enjoy
      </div>

    </div>
  </div>

</body>
</html>
